<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Lato&family=Roboto+Mono&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css" />

  <title>Music Player</title>
</head>

<body>

  <div class="container">

    <!-- 🎵 PLAYER -->
    <div class="player">

      <div class="player-bar">
        <div class="parallel-lines"><div></div><div></div></div>
        <h1 class="fcc-title">MUSIC PLAYER</h1>
        <div class="parallel-lines"><div></div><div></div></div>
      </div>

      <div class="player-content">

        <!-- 🎧 ALBUM -->
        <div id="player-album-art">
          <img
            src="https://cdn.freecodecamp.org/curriculum/js-music-player/quincy-larson-album-art.jpg"
            alt="album"
          />
        </div>

        <!-- 🎶 DISPLAY -->
        <div class="player-display">

          <div class="player-display-song-artist">
            <p id="player-song-title"></p>
            <p id="player-song-artist"></p>
          </div>

          <!-- 🎮 CONTROLS -->
          <div class="player-buttons">
            <button id="previous">⏮</button>
            <button id="play">▶</button>
            <button id="pause">⏸</button>
            <button id="next">⏭</button>
            <button id="shuffle">🔀</button>
          </div>

          <!-- ⏱️ PROGRESS BAR -->
          <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0">
            <span id="duration">0:00</span>
          </div>

        </div>
      </div>
    </div>

    <!-- 📜 PLAYLIST -->
    <div class="playlist">
      <div class="playlist-bar">
        <div class="parallel-lines"><div></div><div></div></div>
        <h2 class="playlist-title">Playlist</h2>
        <div class="parallel-lines"><div></div><div></div></div>
      </div>

      <ul id="playlist-songs"></ul>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
